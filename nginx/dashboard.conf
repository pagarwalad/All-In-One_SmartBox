server {
    # Port 3000 instead of 80 to avoid the OpenMediaVault conflict.
    listen 3000 default_server;
    listen [::]:3000 default_server;

    root /var/www/dashboard;
    index index.html;

    # Serve the dashboard
    location / {
        try_files $uri $uri/ =404;
    }

    # Proxy the system stats API
    location /stats {
        proxy_pass http://127.0.0.1:5050/stats;
        proxy_set_header Host $host;
    }

    # Proxy the AI assistant API (chat widget hits /ask?q=...)
    location /ask {
        proxy_pass http://127.0.0.1:8086/ask;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }
}
