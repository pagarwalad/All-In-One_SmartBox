<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --accent: #00e5a0;
    --accent-glow: rgba(0, 229, 160, 0.15);
    --danger: #ff4d6a;
    --warn: #ffb84d;
    --blue: #4d9fff;
  }

  html, body {
    height: 100%;
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    cursor: default;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glow orb ── */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 40px 60px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .header-left { display: flex; align-items: center; gap: 18px; }

  .logo {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), #00b880);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    color: var(--bg);
    box-shadow: 0 0 30px rgba(0,229,160,.2);
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header h1 span { color: var(--accent); }

  .datetime {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }

  .datetime .time {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .datetime .date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 26px;
    font-weight: 700;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
  }

  .stat-bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width .8s cubic-bezier(.22,.68,0,1);
    border-radius: 0 2px 0 0;
  }

  .stat-bar-fill.warn { background: var(--warn); }
  .stat-bar-fill.danger { background: var(--danger); }

  /* ── Section title ── */
  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-left: 4px;
  }

  /* ── Service grid ── */
  .services {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }

  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 26px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 20px;
    transition: all .25s cubic-bezier(.22,.68,0,1);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--card-accent, var(--accent)) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .25s;
  }

  .service-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }

  .service-card:hover::before { opacity: .06; }

  .service-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
  }

  .service-info { position: relative; z-index: 1; }

  .service-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .service-desc {
    font-size: 13px;
    color: var(--text-dim);
  }

  .service-arrow {
    margin-left: auto;
    font-size: 20px;
    color: var(--text-dim);
    transition: all .25s;
    position: relative;
    z-index: 1;
  }

  .service-card:hover .service-arrow {
    color: var(--card-accent, var(--accent));
    transform: translateX(4px);
  }

  /* ── Status indicator (online/offline) ── */
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 8px rgba(0,229,160,.5);
    animation: pulse 2s infinite;
  }

  .status-dot.offline {
    background: var(--danger);
    box-shadow: 0 0 8px rgba(255,77,106,.5);
    animation: none;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  /* ── Configure modal ── */
  .config-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 48px; height: 48px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    z-index: 100;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center;
  }

  .config-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 90%;
    max-width: 540px;
    max-height: 80vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 22px;
    margin-bottom: 6px;
  }

  .modal p.sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .form-group input, .form-group select {
    width: 100%;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary:hover { box-shadow: 0 0 20px rgba(0,229,160,.3); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--text-dim); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    margin-left: auto;
  }

  .btn-danger:hover { border-color: var(--danger); }

  /* ── Service list in config ── */
  .config-services {
    list-style: none;
    margin-bottom: 20px;
  }

  .config-services li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .config-services li:last-child { border-bottom: none; }

  .config-services .svc-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .config-services .svc-icon { font-size: 20px; }

  .config-services button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all .15s;
  }

  .config-services button:hover {
    color: var(--text);
    background: var(--surface-2);
  }

  .config-services button.del:hover {
    color: var(--danger);
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeUp .5s cubic-bezier(.22,.68,0,1) both;
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header animate-in">
    <div class="header-left">
      <div class="logo">Pi</div>
      <h1>Pi <span>Command Center</span></h1>
    </div>
    <div class="datetime">
      <div class="time" id="clock">--:--</div>
      <div class="date" id="dateline">---</div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card animate-in" style="animation-delay:.05s">
      <div class="stat-label">CPU</div>
      <div class="stat-value" id="cpuVal">--%</div>
      <div class="stat-sub" id="cpuSub">-- °C</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="cpuBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:.1s">
      <div class="stat-label">Memory</div>
      <div class="stat-value" id="ramVal">--%</div>
      <div class="stat-sub" id="ramSub">-- / -- GB</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="ramBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:.15s">
      <div class="stat-label">Disk</div>
      <div class="stat-value" id="diskVal">--%</div>
      <div class="stat-sub" id="diskSub">-- / -- GB</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="diskBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:.2s">
      <div class="stat-label">Uptime</div>
      <div class="stat-value" id="uptimeVal">--</div>
      <div class="stat-sub" id="uptimeSub">since --</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;opacity:.3"></div></div>
    </div>
    <div class="stat-card animate-in" style="animation-delay:.25s">
      <div class="stat-label">Network</div>
      <div class="stat-value" id="netVal">--</div>
      <div class="stat-sub" id="netSub">--</div>
      <div class="stat-bar"><div class="stat-bar-fill" style="width:100%;opacity:.3"></div></div>
    </div>
  </div>

  <!-- Services -->
  <div class="section-title animate-in" style="animation-delay:.3s">Services</div>
  <div class="services" id="servicesGrid">
    <!-- Populated by JS -->
  </div>

  <div class="footer animate-in" style="animation-delay:.5s">
    <span id="hostname">pi</span> &middot; Raspberry Pi 5 &middot; OpenMediaVault
  </div>
</div>

<!-- Config button -->
<button class="config-btn" id="configBtn" title="Configure services">⚙</button>

<!-- Config modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <!-- Filled by JS -->
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════
  //  DEFAULT SERVICES — edit these for your setup
  //  Ports/IPs will be replaced during installation
  // ═══════════════════════════════════════════════════
  const DEFAULT_SERVICES = [
    {
      id: 'homeassistant',
      name: 'Home Assistant',
      desc: 'Smart home control',
      icon: '🏠',
      url: 'http://YOUR_PI_IP:8123',
      color: '#18bcf2'
    },
    {
      id: 'jellyfin',
      name: 'Jellyfin',
      desc: 'Media streaming',
      icon: '🎬',
      url: 'http://YOUR_PI_IP:8096',
      color: '#a95cf2'
    },
    {
      id: 'camera',
      name: 'Camera',
      desc: 'Surveillance feeds',
      icon: '📷',
      url: 'http://YOUR_PI_IP:5000',
      color: '#f2845c'
    },
    {
      id: 'omv',
      name: 'OpenMediaVault',
      desc: 'NAS management',
      icon: '💾',
      url: 'http://YOUR_PI_IP:8080',
      color: '#5c9ef2'
    },
    {
      id: 'portainer',
      name: 'Portainer',
      desc: 'Docker management',
      icon: '🐳',
      url: 'http://YOUR_PI_IP:9443',
      color: '#13b8cf'
    }
  ];

  // ═══════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════
  let services = JSON.parse(localStorage.getItem('pi_dash_services') || 'null') || DEFAULT_SERVICES;

  function saveServices() {
    localStorage.setItem('pi_dash_services', JSON.stringify(services));
  }

  // ═══════════════════════════════════════════════════
  //  CLOCK
  // ═══════════════════════════════════════════════════
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('dateline').textContent =
      now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ═══════════════════════════════════════════════════
  //  STATS  (fetches from local pi-stats API)
  // ═══════════════════════════════════════════════════
  function setBar(id, pct) {
    const bar = document.getElementById(id);
    bar.style.width = pct + '%';
    bar.className = 'stat-bar-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warn' : '');
  }

  async function updateStats() {
    try {
      const r = await fetch('/stats');
      if (!r.ok) throw new Error('stats endpoint unavailable');
      const d = await r.json();

      // CPU
      document.getElementById('cpuVal').textContent = d.cpu_percent + '%';
      document.getElementById('cpuSub').textContent = d.cpu_temp ? d.cpu_temp.toFixed(1) + ' °C' : '';
      setBar('cpuBar', d.cpu_percent);

      // RAM
      const ramPct = d.ram_percent;
      document.getElementById('ramVal').textContent = ramPct + '%';
      document.getElementById('ramSub').textContent = d.ram_used + ' / ' + d.ram_total + ' GB';
      setBar('ramBar', ramPct);

      // Disk
      document.getElementById('diskVal').textContent = d.disk_percent + '%';
      document.getElementById('diskSub').textContent = d.disk_used + ' / ' + d.disk_total + ' GB';
      setBar('diskBar', d.disk_percent);

      // Uptime
      document.getElementById('uptimeVal').textContent = d.uptime;
      document.getElementById('uptimeSub').textContent = 'since ' + d.boot_time;

      // Network
      document.getElementById('netVal').textContent = d.ip || '--';
      document.getElementById('netSub').textContent = d.hostname || '';
      document.getElementById('hostname').textContent = d.hostname || 'pi';

    } catch (e) {
      // Stats API not running — show placeholders
      console.log('Stats API not available:', e.message);
    }
  }

  updateStats();
  setInterval(updateStats, 5000);

  // ═══════════════════════════════════════════════════
  //  RENDER SERVICES
  // ═══════════════════════════════════════════════════
  function renderServices() {
    const grid = document.getElementById('servicesGrid');
    grid.innerHTML = '';
    services.forEach((s, i) => {
      const a = document.createElement('a');
      a.className = 'service-card animate-in';
      a.style.animationDelay = (0.3 + i * 0.06) + 's';
      a.style.setProperty('--card-accent', s.color || 'var(--accent)');
      a.href = s.url;
      a.innerHTML = `
        <div class="service-icon">${s.icon}</div>
        <div class="service-info">
          <div class="service-name">${s.name}</div>
          <div class="service-desc">${s.desc}</div>
        </div>
        <div class="service-arrow">→</div>
      `;
      grid.appendChild(a);
    });
  }

  renderServices();

  // ═══════════════════════════════════════════════════
  //  CONFIGURE MODAL
  // ═══════════════════════════════════════════════════
  const configBtn = document.getElementById('configBtn');
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modalContent');

  configBtn.onclick = () => showServiceList();

  overlay.onclick = (e) => {
    if (e.target === overlay) closeModal();
  };

  function closeModal() { overlay.classList.remove('active'); }

  function showServiceList() {
    modal.innerHTML = `
      <h2>Configure Services</h2>
      <p class="sub">Add, edit, or remove dashboard services.</p>
      <ul class="config-services" id="cfgList"></ul>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="showAddEdit()">+ Add Service</button>
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn btn-danger" onclick="resetDefaults()">Reset</button>
      </div>
    `;
    const list = document.getElementById('cfgList');
    services.forEach((s, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <div class="svc-info">
          <span class="svc-icon">${s.icon}</span>
          <span>${s.name}</span>
        </div>
        <div>
          <button onclick="showAddEdit(${i})">edit</button>
          <button class="del" onclick="deleteService(${i})">✕</button>
        </div>
      `;
      list.appendChild(li);
    });
    overlay.classList.add('active');
  }

  function showAddEdit(index) {
    const editing = index !== undefined;
    const s = editing ? services[index] : { id:'', name:'', desc:'', icon:'📦', url:'http://', color:'#00e5a0' };
    modal.innerHTML = `
      <h2>${editing ? 'Edit' : 'Add'} Service</h2>
      <p class="sub">${editing ? 'Update service details.' : 'Add a new service to your dashboard.'}</p>
      <div class="form-group">
        <label>Name</label>
        <input id="fName" value="${s.name}" placeholder="Home Assistant">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input id="fDesc" value="${s.desc}" placeholder="Smart home control">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Icon (emoji)</label>
          <input id="fIcon" value="${s.icon}" placeholder="🏠">
        </div>
        <div class="form-group">
          <label>Accent Color</label>
          <input id="fColor" type="color" value="${s.color || '#00e5a0'}">
        </div>
      </div>
      <div class="form-group">
        <label>URL</label>
        <input id="fUrl" value="${s.url}" placeholder="http://192.168.1.100:8123">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveService(${editing ? index : -1})">Save</button>
        <button class="btn btn-ghost" onclick="showServiceList()">Cancel</button>
      </div>
    `;
  }

  function saveService(index) {
    const s = {
      id: document.getElementById('fName').value.toLowerCase().replace(/\s+/g,'-'),
      name: document.getElementById('fName').value,
      desc: document.getElementById('fDesc').value,
      icon: document.getElementById('fIcon').value || '📦',
      url: document.getElementById('fUrl').value,
      color: document.getElementById('fColor').value
    };
    if (!s.name || !s.url) return;
    if (index >= 0) services[index] = s;
    else services.push(s);
    saveServices();
    renderServices();
    showServiceList();
  }

  function deleteService(index) {
    if (!confirm('Remove ' + services[index].name + '?')) return;
    services.splice(index, 1);
    saveServices();
    renderServices();
    showServiceList();
  }

  function resetDefaults() {
    if (!confirm('Reset all services to defaults?')) return;
